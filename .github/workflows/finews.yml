name: 财经新闻 AI 日报

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'morning or evening'
        required: false
        default: 'morning'

jobs:
  run-finbot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🌅 早报
        if: github.event.inputs.run_mode != 'evening'
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_MODE: morning
        run: python finews_bot.py

      - name: 🌙 晚报
        if: github.event.inputs.run_mode == 'evening'
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_MODE: evening
        run: python finews_bot.py

      - name: 📊 推送看板数据
        if: always()
        run: |
          git config user.name "finews-bot"
          git config user.email "bot@github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: update dashboard"
          git push

      - name: 📤 上传分析报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 财经日报-${{ github.run_number }}
          path: ~/Downloads/财经新闻_*.txt
          retention-days: 7
