name: 财经新闻 AI 日报

on:
  schedule:
    - cron: '0 0 * * *'    # 北京时间 08:00（早报）
    - cron: '0 12 * * *'   # 北京时间 20:00（晚报）
  workflow_dispatch:

jobs:
  run-finbot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🚀 运行财经机器人
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_MODE: ${{ github.event_name == 'schedule' && github.event.schedule == '0 0 * * *' && 'morning' || github.event_name == 'schedule' && 'evening' || 'morning' }}
        run: python finews_bot.py

      - name: 📤 上传分析报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 财经日报-${{ github.run_number }}
          path: ~/Downloads/财经新闻_*.txt
          retention-days: 7
